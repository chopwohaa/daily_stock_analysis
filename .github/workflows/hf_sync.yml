name: Sync to Hugging Face Hub
on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  sync-to-hub:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0
      
      - name: Clean up large files for HF
        run: |
          # 删掉让 Hugging Face 报错的大文件（仅在同步过程中删除）
          rm -rf docs/assets/*.gif
          rm -rf docs/assets/dsa_vi/*.psd
          
          # 配置临时身份进行本地提交
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          
          # 提交删除操作，但不推回 GitHub，只为了推给 HF
          git add .
          git commit -m "Remove large files for Hugging Face sync" || echo "No changes to commit"

      - name: Push to hub
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          # 强制推送到 Hugging Face
          git push -f https://tuimi:$HF_TOKEN@huggingface.co/spaces/tuimi/my_stock main
