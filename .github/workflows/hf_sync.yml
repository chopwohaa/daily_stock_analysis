name: Sync to Hugging Face hub

on:
  push:
    branches: [main]
  workflow_dispatch: # 允许手动触发

jobs:
  sync-to-hub:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3
        with:
          fetch-depth: 0
          lfs: true # 如果你使用 Git-LFS，务必启用
      - name: Push to hub
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          git push https://tuimi:$HF_TOKEN@huggingface.co/spaces/tuimi/my_stock main
